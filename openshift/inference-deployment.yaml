apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-inference-test
  namespace: user-sbowerma
  labels:
    app: llm-inference-test
    kueue.x-k8s.io/queue-name: unreserved
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-inference-test
  template:
    metadata:
      labels:
        app: llm-inference-test
        kueue.x-k8s.io/queue-name: unreserved
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args:
            - --model
            - /models/meta/Llama-3.2-1B-Instruct-W4A16
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --max-model-len
            - "2048"
            - --gpu-memory-utilization
            - "0.95"
            - --trust-remote-code
          env:
            - name: HOME
              value: /tmp
            - name: HF_HOME
              value: /tmp/huggingface
            - name: VLLM_CACHE_ROOT
              value: /tmp/vllm
            - name: XDG_CACHE_HOME
              value: /tmp/cache
            - name: TMPDIR
              value: /tmp
            - name: OUTLINES_CACHE_DIR
              value: /tmp/outlines
            - name: FLASHINFER_WORKSPACE_DIR
              value: /tmp/flashinfer
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
          volumeMounts:
            - name: output
              mountPath: /models
              readOnly: true
          resources:
            limits:
              nvidia.com/mig-1g.18gb: "1"
            requests:
              nvidia.com/mig-1g.18gb: "1"
      volumes:
        - name: output
          persistentVolumeClaim:
            claimName: inference-models
---
apiVersion: v1
kind: Service
metadata:
  name: llm-inference-test
  namespace: user-sbowerma
spec:
  selector:
    app: llm-inference-test
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
